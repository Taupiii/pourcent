<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PercentGame Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:      #d4924a;
    --accent2:     #b87333;
    --beige:       #c9a882;
    --beige-lt:    #f0dfc5;
    --cream:       #fdf6ee;
    --panel:       rgba(42, 31, 23, 0.88);
    --panel2:      rgba(62, 44, 30, 0.82);
    --pill-bg:     rgba(80, 56, 38, 0.90);
    --pill-border: rgba(160, 110, 65, 0.75);
    --text-muted:  #c4a07a;
    --green:       #6dbf8a;
    --red:         #e07070;
    --purple:      #a78bfa;
    --radius:      14px;
    --radius-sm:   8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    color: var(--cream);
  }

  /* ═══════════════════════════
     PHASE PLAYING
  ═══════════════════════════ */
  #phase-playing {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
  }
  #phase-playing.visible { opacity: 1; }

  /* ── Question banner — top center ── */
  .question-banner {
    position: absolute;
    top: 28px;
    left: 50%; transform: translateX(-50%);
    background: var(--panel);
    border: 2px solid var(--pill-border);
    border-radius: 99px;
    padding: 10px 32px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    white-space: nowrap;
    animation: bannerDrop 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes bannerDrop {
    from { transform: translateX(-50%) translateY(-60px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  .banner-axis {
    font-size: 15px; font-weight: 800; color: var(--text-muted);
    display: flex; align-items: center; gap: 10px;
  }
  .banner-label {
    font-family: 'Baloo 2', sans-serif;
    font-size: 26px; font-weight: 800;
    color: var(--cream);
  }
  .banner-sep {
    width: 1px; height: 30px; background: var(--pill-border);
  }
  .deco-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

  /* ── WHEEL ZONE — bottom right ── */
  .wheel-zone {
    position: absolute;
    right: 0; bottom: 0;
    width: 560px; height: 310px;
    overflow: visible;
  }
  .wheel-zone.entering {
    animation: wheelSlide 1.0s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes wheelSlide {
    from { transform: translate(200px, 150px) scale(0.6); opacity: 0; }
    to   { transform: translate(0, 0) scale(1); opacity: 1; }
  }

  #wheelSvg {
    position: absolute;
    bottom: 0; right: 0;
    width: 560px; height: 310px;
    filter: drop-shadow(0 0 24px rgba(212,146,74,0.35));
  }

  #needleGroup {
    transform-origin: 280px 298px;
    transition: transform 0.9s cubic-bezier(0.34, 1.3, 0.64, 1);
  }

  /* ── Avg + info panel beside wheel ── */
  .wheel-info {
    position: absolute;
    right: 570px; bottom: 20px;
    text-align: right;
    pointer-events: none;
  }
  .avg-number {
    font-family: 'Baloo 2', sans-serif;
    font-size: 88px; font-weight: 800; line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(212,146,74,0.5), 0 4px 8px rgba(0,0,0,0.6);
    animation: slideR 0.5s 0.2s ease both;
  }
  .avg-unit {
    font-family: 'Baloo 2', sans-serif;
    font-size: 36px; color: var(--text-muted);
  }
  .guess-count-lbl {
    font-size: 15px; font-weight: 800;
    color: var(--text-muted); text-align: right;
    font-family: 'Nunito', sans-serif;
    animation: slideR 0.5s 0.3s ease both;
  }

  @keyframes slideR {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  /* ── Top 3 ── */
  .top3 {
    position: absolute;
    right: 570px; bottom: 220px;
    display: flex; flex-direction: column; gap: 7px;
    opacity: 0; transition: opacity 0.5s 0.3s;
  }
  .top3.visible { opacity: 1; }
  .top3-title {
    font-size: 11px; font-weight: 900; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-muted);
    text-align: right; margin-bottom: 4px;
  }
  .top3-item {
    display: flex; align-items: center; justify-content: flex-end; gap: 10px;
    padding: 8px 14px 8px 18px;
    background: var(--panel2); border: 1.5px solid var(--pill-border);
    border-radius: 99px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  @keyframes popIn { from{transform:scale(0.5) translateX(20px);opacity:0} to{transform:scale(1) translateX(0);opacity:1} }
  .t3-name { font-size: 17px; font-weight: 800; color: var(--beige-lt); }
  .t3-score { font-family: 'Baloo 2', sans-serif; font-size: 14px; font-weight: 800; color: var(--accent); }
  .t3-score::after { content: 'pt'; font-size: 10px; color: var(--text-muted); margin-left: 2px; }
  .t3-medal { font-size: 20px; }

  /* ═══════════════════════════
     WINNER SPLASH
  ═══════════════════════════ */
  #winnerSplash {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity 0.4s;
  }
  #winnerSplash.visible { opacity: 1; }
  .winner-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(212,146,74,0.12) 0%, transparent 65%);
  }
  .winner-card {
    position: relative;
    background: var(--panel);
    border: 2px solid var(--pill-border);
    border-radius: 24px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(212,146,74,0.25), 0 24px 64px rgba(0,0,0,0.6);
    animation: winnerPop 0.6s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes winnerPop { from{transform:scale(0.4);opacity:0} to{transform:scale(1);opacity:1} }
  .winner-emoji { font-size: 72px; display: block; margin-bottom: 8px; }
  .winner-sub { font-size: 13px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .winner-name {
    font-family: 'Baloo 2', sans-serif; font-size: 68px; font-weight: 800;
    color: var(--accent); line-height: 1;
    text-shadow: 0 0 30px rgba(212,146,74,0.6);
  }
  .winner-answer { font-family: 'Baloo 2', sans-serif; font-size: 28px; font-weight: 800; color: var(--text-muted); margin-top: 10px; }

  /* ── deco bar ── */
  .deco-bar { height: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent), var(--beige)); border-radius: 3px; margin: 12px 0; }

  /* confetti */
  .confetti-piece { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(0)rotate(0deg)} 100%{opacity:0;transform:translateY(1200px)rotate(720deg)} }

  /* ═══════════════════════════
     LEADERBOARD PHASE
  ═══════════════════════════ */
  #phase-leaderboard {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity 0.6s;
  }
  #phase-leaderboard.visible { opacity: 1; }

  .lb-panel {
    width: 660px;
    background: var(--panel);
    border: 2px solid var(--pill-border);
    border-radius: 24px;
    padding: 36px 44px;
    box-shadow: 0 0 80px rgba(212,146,74,0.15), 0 24px 64px rgba(0,0,0,0.6);
  }
  .lb-header { text-align: center; margin-bottom: 24px; }
  .lb-eyebrow { font-size: 12px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .lb-title-text {
    font-family: 'Baloo 2', sans-serif; font-size: 42px; font-weight: 800;
    color: var(--cream); letter-spacing: 0.04em;
  }
  .lb-title-text span { color: var(--accent); }

  .lb-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .lb-item {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 18px;
    background: var(--panel2); border: 1.5px solid rgba(160,110,65,0.2);
    border-radius: 99px;
    animation: lbSlide 0.5s ease both;
    position: relative; overflow: hidden;
  }
  .lb-item:nth-child(1) { border-color: rgba(212,175,55,0.35); background: rgba(212,175,55,0.07); }
  @keyframes lbSlide { from{transform:translateX(-50px);opacity:0} to{transform:translateX(0);opacity:1} }
  .lb-item:nth-child(1){animation-delay:.05s} .lb-item:nth-child(2){animation-delay:.1s}
  .lb-item:nth-child(3){animation-delay:.15s} .lb-item:nth-child(4){animation-delay:.2s}
  .lb-item:nth-child(5){animation-delay:.25s} .lb-item:nth-child(n+6){animation-delay:.3s}

  .lb-bar { position:absolute; left:0;top:0;bottom:0; border-radius:99px; background:linear-gradient(90deg,rgba(212,146,74,0.12),transparent); transition:width 1.2s ease; }
  .lb-rank-num { font-size: 18px; font-weight: 800; width: 36px; text-align: center; flex-shrink: 0; font-family: 'Baloo 2', sans-serif; color: var(--text-muted); }
  .lb-rank-num.g1 { color: #d4af37; text-shadow: 0 0 12px rgba(212,175,55,0.6); }
  .lb-rank-num.g2 { color: #a8a8a8; }
  .lb-rank-num.g3 { color: #cd7f32; }
  .lb-name-txt { flex: 1; font-size: 22px; font-weight: 800; color: var(--beige-lt); position: relative; }
  .lb-item:nth-child(1) .lb-name-txt { color: var(--cream); font-size: 24px; }
  .lb-score-num {
    font-family: 'Baloo 2', sans-serif; font-size: 20px; font-weight: 800;
    color: var(--accent); position: relative;
  }
  .lb-score-num::after { content: ' pts'; font-size: 11px; color: var(--text-muted); font-weight: 700; }
</style>
</head>
<body>

<!-- ══ PLAYING ══ -->
<div id="phase-playing">

  <!-- Banner -->
  <div class="question-banner" id="questionBanner">
    <span class="deco-dot"></span>
    <div class="banner-axis"><span id="minLbl">Froid</span></div>
    <div class="banner-sep"></div>
    <div class="banner-label" id="questionLbl">Café</div>
    <div class="banner-sep"></div>
    <div class="banner-axis"><span id="maxLbl">Chaud</span></div>
    <span class="deco-dot"></span>
  </div>

  <!-- Top 3 -->
  <div class="top3" id="top3">
    <div class="top3-title">Top joueurs</div>
  </div>

  <!-- Avg + count -->
  <div class="wheel-info">
    <div class="avg-number" id="avgNum">—<span class="avg-unit" id="avgUnit"></span></div>
    <div class="guess-count-lbl" id="gcLbl">0 propositions</div>
  </div>

  <!-- Half wheel -->
  <div class="wheel-zone" id="wheelZone">
    <svg id="wheelSvg" viewBox="0 0 560 310" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="wGrad" cx="50%" cy="100%" r="60%">
          <stop offset="0%" stop-color="rgba(62,44,30,0.95)"/>
          <stop offset="100%" stop-color="rgba(20,13,8,0.98)"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="needleGlow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Wheel background fill -->
      <path d="M20 298 A260 260 0 0 1 540 298 Z"
        fill="url(#wGrad)"
        stroke="rgba(160,110,65,0.6)" stroke-width="1.5"/>

      <!-- Colored gradient arc segments -->
      <path id="arcCold" d="" fill="none" stroke-width="16" stroke="rgba(100,150,220,0.25)" opacity="0.8"/>
      <path id="arcMid"  d="" fill="none" stroke-width="16" stroke="rgba(212,146,74,0.2)"  opacity="0.8"/>
      <path id="arcHot"  d="" fill="none" stroke-width="16" stroke="rgba(200,80,60,0.2)"   opacity="0.8"/>

      <!-- Active live arc -->
      <path id="arcLive" d="" fill="none" stroke-width="6"
        stroke="url(#liveGrad)" opacity="0"
        filter="url(#glow)"/>
      <defs>
        <linearGradient id="liveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="var(--accent2)"/>
          <stop offset="100%" stop-color="var(--accent)"/>
        </linearGradient>
      </defs>

      <!-- Ticks + labels -->
      <g id="ticks"></g>

      <!-- Answer marker (revealed on stop) -->
      <g id="answerMark" opacity="0" style="transform-origin:280px 298px">
        <line x1="280" y1="298" x2="280" y2="44" stroke="var(--green)" stroke-width="2" stroke-dasharray="7,5" opacity="0.7"/>
        <circle cx="280" cy="44" r="9" fill="var(--green)" filter="url(#glow)"/>
        <text id="answerMarkTxt" x="280" y="29" text-anchor="middle" fill="var(--green)" font-family="Baloo 2" font-size="14" font-weight="800"></text>
      </g>

      <!-- Needle -->
      <g id="needleGroup">
        <line x1="280" y1="298" x2="280" y2="46" stroke="rgba(0,0,0,0.35)" stroke-width="5" stroke-linecap="round"/>
        <line x1="280" y1="298" x2="280" y2="44" stroke="var(--cream)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="280" cy="44" r="6" fill="var(--accent)" filter="url(#needleGlow)"/>
        <circle cx="280" cy="298" r="14" fill="var(--panel2)" stroke="var(--pill-border)" stroke-width="2"/>
        <circle cx="280" cy="298" r="5" fill="var(--cream)"/>
      </g>
    </svg>
  </div>

  <!-- Winner splash -->
  <div id="winnerSplash">
    <div class="winner-glow"></div>
    <div id="confettiLayer" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>
    <div class="winner-card">
      <span class="winner-emoji">🎉</span>
      <div class="winner-sub">A trouvé !</div>
      <div class="winner-name" id="winnerNameEl"></div>
      <div class="deco-bar"></div>
      <div class="winner-answer" id="winnerAnsEl"></div>
    </div>
  </div>

</div>

<!-- ══ LEADERBOARD ══ -->
<div id="phase-leaderboard">
  <div class="lb-panel">
    <div class="lb-header">
      <div class="lb-eyebrow">Classement</div>
      <div class="lb-title-text">Percent<span>Game</span></div>
      <div class="deco-bar" style="margin:10px 0 0"></div>
    </div>
    <ul class="lb-list" id="lbList"></ul>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const CX = 280, CY = 298, R = 258;
const PI = Math.PI;

// ── SVG helpers ────────────────────────────────────────────────────────────
function polar(pct, radius) {
  const rad = PI + (pct / 100) * PI;
  return { x: CX + radius * Math.cos(rad), y: CY + radius * Math.sin(rad) };
}
function arcD(s, e, rad) {
  const a = polar(s, rad), b = polar(e, rad);
  const large = (e - s) > 50 ? 1 : 0;
  return `M${a.x} ${a.y} A${rad} ${rad} 0 ${large} 1 ${b.x} ${b.y}`;
}

// ── Build wheel ────────────────────────────────────────────────────────────
function buildWheel() {
  const rArc = R - 14;
  document.getElementById('arcCold').setAttribute('d', arcD(0, 33, rArc));
  document.getElementById('arcMid').setAttribute('d', arcD(33, 66, rArc));
  document.getElementById('arcHot').setAttribute('d', arcD(66, 100, rArc));

  const g = document.getElementById('ticks');
  g.innerHTML = '';
  for (let i = 0; i <= 10; i++) {
    const p = i * 10;
    const inner = polar(p, R - 22); const outer = polar(p, R - 6);
    const line = makeSVG('line');
    Object.assign(line, {}); // attrs below
    line.setAttribute('x1', inner.x); line.setAttribute('y1', inner.y);
    line.setAttribute('x2', outer.x); line.setAttribute('y2', outer.y);
    line.setAttribute('stroke', 'rgba(201,168,130,0.5)'); line.setAttribute('stroke-width', '2');
    g.appendChild(line);
    const lpt = polar(p, R - 42);
    const txt = makeSVG('text');
    txt.setAttribute('x', lpt.x); txt.setAttribute('y', lpt.y + 5);
    txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('fill', 'rgba(196,160,122,0.7)');
    txt.setAttribute('font-family', 'Baloo 2, sans-serif'); txt.setAttribute('font-size', '13');
    txt.setAttribute('font-weight', '800'); txt.textContent = p;
    g.appendChild(txt);
  }
  // minor ticks
  for (let i = 1; i < 20; i++) {
    if (i % 2 === 0) continue;
    const p = i * 5;
    const inner = polar(p, R - 14); const outer = polar(p, R - 6);
    const line = makeSVG('line');
    line.setAttribute('x1', inner.x); line.setAttribute('y1', inner.y);
    line.setAttribute('x2', outer.x); line.setAttribute('y2', outer.y);
    line.setAttribute('stroke', 'rgba(160,110,65,0.3)'); line.setAttribute('stroke-width', '1.5');
    g.appendChild(line);
  }
}
function makeSVG(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

// ── Needle ─────────────────────────────────────────────────────────────────
function setNeedle(pct) {
  const deg = (pct / 100) * 180 - 90;
  document.getElementById('needleGroup').style.transform = `rotate(${deg}deg)`;
}

function showAnswerMark(pct) {
  const mark = document.getElementById('answerMark');
  const deg = (pct / 100) * 180 - 90;
  mark.style.transform = `rotate(${deg}deg)`;
  document.getElementById('answerMarkTxt').textContent = pct + '%';
  mark.setAttribute('opacity', '1');
}
function hideAnswerMark() { document.getElementById('answerMark').setAttribute('opacity', '0'); }

function updateArcLive(pct) {
  const arc = document.getElementById('arcLive');
  if (pct === null) { arc.setAttribute('opacity', '0'); return; }
  arc.setAttribute('d', arcD(0, pct, R - 28));
  arc.setAttribute('opacity', '0.85');
}

// ── Top 3 ──────────────────────────────────────────────────────────────────
const medals = ['🥇','🥈','🥉'];
function renderTop3(scores) {
  const el = document.getElementById('top3');
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0, 3);
  if (!sorted.length) { el.classList.remove('visible'); return; }
  el.innerHTML = '<div class="top3-title">Top joueurs</div>' +
    sorted.map(([name, score], i) => `<div class="top3-item" style="animation-delay:${i*.1}s">
      <span class="t3-name">${esc(name)}</span>
      <span class="t3-score">${score}</span>
      <span class="t3-medal">${medals[i]||''}</span>
    </div>`).join('');
  el.classList.add('visible');
}

// ── Leaderboard ────────────────────────────────────────────────────────────
function renderLeaderboard(scores) {
  const list = document.getElementById('lbList');
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  if (!sorted.length) { list.innerHTML = '<li style="text-align:center;color:rgba(201,168,130,0.4);padding:24px;font-weight:800">Aucun score</li>'; return; }
  list.innerHTML = sorted.slice(0, 8).map(([name, score], i) => {
    const gClass = i === 0 ? 'g1' : i === 1 ? 'g2' : i === 2 ? 'g3' : '';
    const rankDisplay = i < 3 ? medals[i] : (i+1);
    return `<li class="lb-item" style="animation-delay:${i*.07}s">
      <div class="lb-bar" style="width:${(score/max)*100}%"></div>
      <span class="lb-rank-num ${gClass}">${rankDisplay}</span>
      <span class="lb-name-txt">${esc(name)}</span>
      <span class="lb-score-num">${score}</span>
    </li>`;
  }).join('');
}

// ── Confetti ───────────────────────────────────────────────────────────────
function spawnConfetti() {
  const c = document.getElementById('confettiLayer');
  c.innerHTML = '';
  const cols = ['#d4924a','#b87333','#c9a882','#f0dfc5','#6dbf8a','#a78bfa','#fdf6ee','#e07070'];
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*1920}px;top:-16px;background:${cols[i%cols.length]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*.7}s`;
    c.appendChild(p);
  }
}

// ── State / phases ─────────────────────────────────────────────────────────
let prev = {};

function applyState(state) {
  const { phase, question, scores, winner, answer } = state;
  const playing = document.getElementById('phase-playing');
  const leaderboard = document.getElementById('phase-leaderboard');
  const winnerSplash = document.getElementById('winnerSplash');

  if (phase === 'playing' || phase === 'stopped') {
    playing.classList.add('visible');
    leaderboard.classList.remove('visible');

    // Wheel enter animation when newly switching to playing
    if (prev.phase !== 'playing' && prev.phase !== 'stopped') {
      const zone = document.getElementById('wheelZone');
      zone.classList.remove('entering');
      void zone.offsetWidth;
      zone.classList.add('entering');
      hideAnswerMark();
      updateArcLive(null);
      // Reset needle to center
      setNeedle(50);
    }

    // Update banner
    if (question) {
      document.getElementById('questionLbl').textContent = question.label;
      document.getElementById('minLbl').textContent = question.minLabel;
      document.getElementById('maxLbl').textContent = question.maxLabel;
    }

    // Answer marker
    if (phase === 'stopped' && answer !== undefined) {
      showAnswerMark(answer);
      updateArcLive(null);
    } else if (phase === 'playing') {
      hideAnswerMark();
    }

    // Winner
    if (winner && winner !== prev.winner) {
      document.getElementById('winnerNameEl').textContent = winner;
      document.getElementById('winnerAnsEl').textContent = 'Réponse : ' + answer + '%';
      winnerSplash.classList.add('visible');
      spawnConfetti();
    } else if (!winner) {
      winnerSplash.classList.remove('visible');
    }

  } else if (phase === 'leaderboard') {
    playing.classList.remove('visible');
    leaderboard.classList.add('visible');
    winnerSplash.classList.remove('visible');
    renderLeaderboard(scores || {});
  } else {
    playing.classList.remove('visible');
    leaderboard.classList.remove('visible');
    winnerSplash.classList.remove('visible');
  }

  renderTop3(scores || {});
  prev = { ...state };
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') applyState(msg.payload);
    if (msg.type === 'average') {
      const v = msg.value;
      document.getElementById('avgNum').innerHTML = v !== null
        ? v + '<span class="avg-unit">%</span>'
        : '—';
      document.getElementById('gcLbl').textContent = msg.guessCount + ' proposition' + (msg.guessCount !== 1 ? 's' : '');
      if (v !== null) { setNeedle(v); updateArcLive(v); }
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ───────────────────────────────────────────────────────────────────
buildWheel();
setNeedle(50);
connectWS();
fetch('/api/state').then(r => r.json()).then(applyState);
</script>
